name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download Website
        run: |
          sudo apt-get install -y httrack
          httrack https://www.alomariya.org/ -O ./site -r5 -%v -X "*.mp4" -X "*.mp3"
          mv ./site/www.alomariya.org ./www
          python3 fix_viewport.py

      - name: Fix Viewport
        run: |
          cat > fix_viewport.py << 'EOF'
          import os, re
          for root, dirs, files in os.walk('./www'):
              for f in files:
                  if f.endswith('.html'):
                      path = os.path.join(root, f)
                      txt = open(path, encoding='utf-8', errors='ignore').read()
                      txt = re.sub(r'<meta name="viewport"[^>]*>', '', txt)
                      txt = txt.replace('<head>', '<head><meta name="viewport" content="width=device-width, initial-scale=1.0">')
                      open(path, 'w', encoding='utf-8').write(txt)
          EOF
          python3 fix_viewport.py

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@4 @capacitor/cli@4 @capacitor/android@4
          npx cap init ALOMARIYA com.alomariya.app --web-dir www
          npx cap add android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: alomariya-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
